spring.application.name=savings-engine

# PostgreSQL
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/ajo}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Nomba LIVE — set these env vars before starting
nomba.api.base-url=https://api.nomba.com
nomba.api.account-id=${NOMBA_ACCOUNT_ID:}
nomba.api.sub-account-id=${NOMBA_SUB_ACCOUNT_ID:}
nomba.api.client-id=${NOMBA_CLIENT_ID:}
nomba.api.client-secret=${NOMBA_CLIENT_SECRET:}

nomba.api.sender-name=${NOMBA_SENDER_NAME:Rota Savings}

# Nomba webhook signing secret (from Nomba dashboard → Webhooks)
# Leave blank locally to skip signature verification (see WebhookServiceImpl warning)
nomba.webhook.secret=${NOMBA_WEBHOOK_SECRET:}
# Live-environment webhook signing secret — set once the live webhook is configured on the
# Nomba dashboard. While set, webhooks are accepted against either secret (cutover period).
nomba.webhook.live-secret=${NOMBA_LIVE_WEBHOOK_SECRET:}

# Springdoc / Swagger UI
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs
springdoc.paths-to-match=/api/v1/**,/webhooks/**

# Default detection scheduler
# Set cron to "0/30 * * * * *" for testing (every 30 s) to quickly observe PENDING→MISSED
savings.scheduler.default-detection.enabled=true
savings.scheduler.default-detection.cron=0 */15 * * * *
# Days before periodEnd to fire CONTRIBUTION_DUE_SOON notification
savings.scheduler.default-detection.due-soon-days=2