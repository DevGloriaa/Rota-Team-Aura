spring.application.name=savings-engine

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/ajo
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Nomba sandbox — set these env vars before starting
nomba.api.sandbox-base-url=https://sandbox.nomba.com
nomba.api.account-id=${NOMBA_ACCOUNT_ID:}
nomba.api.client-id=${NOMBA_CLIENT_ID:}
nomba.api.client-secret=${NOMBA_CLIENT_SECRET:}

# Nomba webhook signing secret (from Nomba dashboard → Webhooks)
# Leave blank locally to skip signature verification (see WebhookServiceImpl warning)
nomba.webhook.secret=${NOMBA_WEBHOOK_SECRET:}

# Default detection scheduler
# Set cron to "0/30 * * * * *" for testing (every 30 s) to quickly observe PENDING→MISSED
savings.scheduler.default-detection.enabled=true
savings.scheduler.default-detection.cron=0 */15 * * * *
# Days before periodEnd to fire CONTRIBUTION_DUE_SOON notification
savings.scheduler.default-detection.due-soon-days=2